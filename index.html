<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAGReen</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    
    <section class="hero">
        <div class="container">
            <div class="menu-block">
                <nav class="main-menu">
                    <ul>
                        <li><a href="#">О нас</a></li>
                        <li><a href="#">Новинки</a></li>
                        <li><a href="#">Каталог</a></li>
                        <li><a href="#">Популярные</a></li>
                        <li><a href="#">Контакты</a></li>
                    </ul>
                </nav>
            </div>
            
            <div class="hero_text">
                <h1>TEAGReen</h1>
                <p>premium for everyone</p>
            </div>
        </div>
    </section>
    
    <section class="carousel-section">
        <div class="container">
            <h2 class="section-title">Популярные сорта</h2>
            
            <div class="swiper productSwiper">
                <div class="swiper-wrapper">
                    
                    <div class="swiper-slide">
                        <div class="product-card">
                            <img src="pic/tea1.jpg" alt="Молочный улун">
                            <h3>Молочный улун</h3>
                            <p class="price">650 ₽ / 50г</p>
                            <button class="btn">В корзину</button>
                        </div>
                    </div>
                    
                    <div class="swiper-slide">
                        <div class="product-card">
                            <img src="pic/tea2.jpg" alt="Зеленый чай с жасмином">
                            <h3>Зеленый чай с жасмином</h3>
                            <p class="price">450 ₽ / 50г</p>
                            <button class="btn">В корзину</button>
                        </div>
                    </div>
                    
                    <div class="swiper-slide">
                        <div class="product-card">
                            <img src="pic/tea3.jpg" alt="Восточная красавица">
                            <h3>Восточная красавица</h3>
                            <p class="price">580 ₽ / 50г</p>
                            <button class="btn">В корзину</button>
                        </div>
                    </div>
                    
                    <div class="swiper-slide">
                        <div class="product-card">
                            <img src="pic/tea4.jpg" alt="Красный улун">
                            <h3>Красный улун</h3>
                            <p class="price">620 ₽ / 50г</p>
                            <button class="btn">В корзину</button>
                        </div>
                    </div>
                    
                    <div class="swiper-slide">
                        <div class="product-card">
                            <img src="pic/tea5.jpg" alt="Шэн Пуэр">
                            <h3>Шэн Пуэр</h3>
                            <p class="price">720 ₽ / 50г</p>
                            <button class="btn">В корзину</button>
                        </div>
                    </div>
                    
                </div>
                
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
